<html lang="zh-CN">
<head>

  <link rel="manifest" href="data:application/json;base64,ewogICJuYW1lIjogIuWMuuWdl+Wkh+azqOWZqCIsCiAgInNob3J0X25hbWUiOiAi5Yy65Z2X5aSH5rOoIiwKICAic3RhcnRfdXJsIjogIi4iLAogICJkaXNwbGF5IjogInN0YW5kYWxvbmUiLAogICJiYWNrZ3JvdW5kX2NvbG9yIjogIiMyYjNhMmIiLAogICJ0aGVtZV9jb2xvciI6ICIjMmIzYTJiIiwKICAiaWNvbnMiOiBbCiAgICB7CiAgICAgICJzcmMiOiAiZGF0YTppbWFnZS9zdmcreG1sLCUzQ3N2ZyB4bWxucz0naHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmcnIHZpZXdCb3g9JzAgMCAxMDAgMTAwJyUzRSUzQ3JlY3Qgd2lkdGg9JzEwMCcgaGVpZ2h0PScxMDAnIGZpbGw9JyUyMzViNmU0YicvJTNFJTNDdGV4dCB4PSc1MCcgeT0nNjUnIGZvbnQtc2l6ZT0nNTAnIHRleHQtYW5jaG9yPSdtaWRkbGUnIGZpbGw9J3doaXRlJyUzRSVFNyVBQyU5NCUzQy90ZXh0JTNFJTNDL3N2ZyUzRSIsCiAgICAgICJzaXplcyI6ICIxOTJ4MTkyIiwKICAgICAgInR5cGUiOiAiaW1hZ2Uvc3ZnK3htbCIKICAgIH0KICBdCn0=">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #2b3a2b 0%, #1c2a1c 100%);
      font-family: 'Segoe UI', 'Roboto', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 0.5rem;
      margin: 0;
      overflow: hidden;
      touch-action: manipulation;
    }

    .app-container {
      max-width: 100%;
      width: 100%;
      height: 100vh;
      height: 100dvh;
      background: #fbf5e8;
      box-shadow: 0 30px 50px rgba(0, 0, 0, 0.5), inset 0 1px 10px rgba(255, 255, 200, 0.6);
      padding: 0.8rem;
      border: 1px solid #d4b68a;
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
      border-radius: 1.5rem;
    }

    h1 {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      font-weight: 500;
      font-size: clamp(1.2rem, 4vw, 1.8rem);
      letter-spacing: 2px;
      color: #3a4a2a;
      text-shadow: 1px 1px 0 #e7d7b0;
      margin-bottom: 0;
      flex-shrink: 0;
    }
    h1 span {
      background: #5b6e4b;
      color: #f7f3d7;
      padding: 0.2rem 0.8rem;
      border-radius: 3rem;
      font-size: clamp(0.8rem, 2.5vw, 1rem);
      font-weight: 600;
    }

    .controls-panel {
      background: #e7dcc0;
      border-radius: 2.5rem;
      padding: 0.6rem 0.8rem;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      box-shadow: inset 0 2px 8px rgba(90, 70, 20, 0.3), 0 8px 12px rgba(0,0,0,0.2);
      border: 1px solid #c8af7e;
      flex-shrink: 0;
    }

    .coords-input {
      display: flex;
      align-items: center;
      gap: 0.2rem;
      background: #fef9e6;
      padding: 0.2rem 0.6rem;
      border-radius: 2.5rem;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    .coords-input label {
      font-weight: 600;
      color: #4b5c33;
      font-size: clamp(0.7rem, 2vw, 0.85rem);
    }
    .coords-input input {
      width: clamp(50px, 10vw, 65px);
      padding: 0.3rem 0.2rem;
      border: 1px solid #b99e6b;
      border-radius: 1.5rem;
      text-align: center;
      font-weight: bold;
      background: #fffef7;
      color: #2d3a1f;
      font-size: clamp(0.75rem, 2vw, 0.9rem);
      outline: none;
    }
    .coords-input input:focus {
      border-color: #6f8c4a;
      box-shadow: 0 0 0 3px rgba(100, 130, 60, 0.4);
    }

    button {
      background: #cfaa6a;
      border: none;
      color: #2e2b1f;
      font-weight: bold;
      padding: clamp(0.3rem, 1.5vw, 0.5rem) clamp(0.6rem, 2vw, 1rem);
      border-radius: 2.5rem;
      font-size: clamp(0.7rem, 2vw, 0.85rem);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.2rem;
      box-shadow: 0 4px 0 #7a623c, 0 4px 8px rgba(0,0,0,0.3);
      border: 1px solid #efd49e;
      transition: all 0.08s ease;
      text-shadow: 0 1px 0 white;
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
    }
    button:active {
      transform: translateY(2px);
      box-shadow: 0 2px 0 #5a4328, 0 3px 6px rgba(0,0,0,0.25);
      background: #c29b4e;
    }

    .btn-danger {
      background: #d44545;
      border-color: #ff8a8a;
      color: #fff5f5;
      text-shadow: 0 1px 0 #4a0000;
      box-shadow: 0 4px 0 #7a2a2a, 0 4px 8px rgba(0,0,0,0.3);
    }
    .btn-danger:active {
      background: #b53535;
      box-shadow: 0 2px 0 #5a1a1a, 0 3px 6px rgba(0,0,0,0.25);
    }

    .btn-export {
      background: #4a90d9;
      border-color: #7ab8ff;
      color: #f0f6ff;
      text-shadow: 0 1px 0 #1a3a5a;
      box-shadow: 0 4px 0 #2a5a8a, 0 4px 8px rgba(0,0,0,0.3);
    }
    .btn-export:active {
      background: #3a7bc8;
      box-shadow: 0 2px 0 #1a3a5a, 0 3px 6px rgba(0,0,0,0.25);
    }

    .btn-import {
      background: #5a9a4a;
      border-color: #8acf7a;
      color: #f0fff0;
      text-shadow: 0 1px 0 #1a3a1a;
      box-shadow: 0 4px 0 #2a5a2a, 0 4px 8px rgba(0,0,0,0.3);
    }
    .btn-import:active {
      background: #4a8a3a;
      box-shadow: 0 2px 0 #1a3a1a, 0 3px 6px rgba(0,0,0,0.25);
    }

    .btn-install {
      background: #8a6a3a;
      border-color: #bfa070;
      color: #fff8e8;
      text-shadow: 0 1px 0 #3a2a1a;
      box-shadow: 0 4px 0 #5a3a1a, 0 4px 8px rgba(0,0,0,0.3);
    }
    .btn-install:active {
      background: #6a4a2a;
      box-shadow: 0 2px 0 #3a1a0a, 0 3px 6px rgba(0,0,0,0.25);
    }

    .grid-wrapper {
      background: #7c9a5e;
      border-radius: 1.5rem;
      padding: 0.5rem;
      box-shadow: inset 0 0 15px #2d381a, 0 15px 20px rgba(0, 0, 0, 0.5);
      border: 2px solid #b5935a;
      flex: 1;
      overflow: hidden;
      position: relative;
      cursor: grab;
      min-height: 0;
      touch-action: none;
    }
    .grid-wrapper:active {
      cursor: grabbing;
    }
    .grid-wrapper.dragging {
      cursor: grabbing;
    }

    canvas {
      display: block;
      position: absolute;
      top: 0;
      left: 0;
      border-radius: 1.2rem;
      background: #8faa6f;
      box-shadow: 0 0 0 3px #5b4b2b;
      image-rendering: auto;
      touch-action: none;
    }

    .info-bar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      background: #f3e5c7;
      border-radius: 2.5rem;
      padding: 0.5rem 1rem;
      font-weight: 500;
      color: #3e412b;
      box-shadow: inset 0 1px 8px rgba(139, 115, 55, 0.5);
      border: 1px solid #cfb27c;
      font-size: clamp(0.7rem, 2vw, 0.9rem);
      flex-shrink: 0;
      gap: 0.5rem;
    }

    .selected-info {
      background: #524b31;
      color: #f6f0d7;
      padding: 0.2rem 0.8rem;
      border-radius: 2rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      flex-wrap: wrap;
      font-size: clamp(0.65rem, 1.8vw, 0.85rem);
    }

    .edit-section {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      flex-wrap: wrap;
    }
    .edit-section input {
      padding: 0.4rem 0.6rem;
      border-radius: 2rem;
      border: 1px solid #b59b5c;
      background: #fffef3;
      width: clamp(80px, 20vw, 140px);
      font-size: clamp(0.7rem, 2vw, 0.85rem);
      outline: none;
    }
    .edit-section input:focus {
      border-color: #5d7940;
      box-shadow: 0 0 0 3px rgba(110, 140, 50, 0.5);
    }
    .note-badge {
      background: #cfaa6a;
      padding: 0.2rem 0.5rem;
      border-radius: 1.2rem;
      font-weight: bold;
      color: #1e2610;
      font-size: clamp(0.65rem, 1.8vw, 0.85rem);
    }

    .auto-save-hint {
      font-size: clamp(0.55rem, 1.3vw, 0.7rem);
      color: #8a7a5a;
      font-style: italic;
    }

    .storage-indicator {
      font-size: clamp(0.6rem, 1.5vw, 0.75rem);
      color: #5b6e4b;
      display: flex;
      align-items: center;
      gap: 0.2rem;
    }

    .zoom-indicator {
      font-size: clamp(0.6rem, 1.5vw, 0.75rem);
      color: #5b6e4b;
      background: #e7dcc0;
      padding: 0.15rem 0.5rem;
      border-radius: 1rem;
    }

    #fileInput {
      display: none;
    }

    .toast {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #333;
      color: #fff;
      padding: 0.8rem 1.5rem;
      border-radius: 2rem;
      font-size: 0.9rem;
      z-index: 1000;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }
    .toast.show {
      opacity: 1;
    }

    @media (max-width: 600px) {
      .app-container {
        padding: 0.5rem;
        gap: 0.5rem;
      }
      .controls-panel {
        gap: 0.4rem;
        padding: 0.5rem;
      }
      .edit-section input {
        width: 80px;
      }
    }
  </style>
</head>
<body>
<div id="toast" class="toast"></div>
<input type="file" id="fileInput" accept=".json">

<div class="app-container">
  <h1>
    📦 区块备注器
    <span>可编辑</span>
  </h1>

  <div class="controls-panel">
    <div class="coords-input">
      <label>📍 X</label>
      <input type="number" id="coordX" value="0" step="1" placeholder="X">
    </div>
    <div class="coords-input">
      <label>📍 Y</label>
      <input type="number" id="coordY" value="0" step="1" placeholder="Y">
    </div>
    <button id="goBtn">
      <span>🔍</span> 跳转
    </button>
    <button id="resetViewBtn">
      <span>🔄</span> 重置
    </button>
    <button id="exportBtn" class="btn-export">
      <span>📦</span> 打包导出
    </button>
    <button id="importBtn" class="btn-import">
      <span>📥</span> 导入
    </button>
    <button id="installBtn" class="btn-install" style="display:none;">
      <span>📲</span> 安装应用
    </button>
    <button id="clearAllBtn" class="btn-danger">
      <span>🗑️</span> 清空
    </button>
    <span class="storage-indicator" id="storageIndicator">💾 已缓存</span>
    <span class="zoom-indicator" id="zoomIndicator">🔍 100%</span>
  </div>

  <div class="grid-wrapper" id="gridWrapper">
    <canvas id="chunkCanvas"></canvas>
  </div>

  <div class="info-bar">
    <div class="selected-info" id="selectedDisplay">
      <span>🖱️ 选中</span>
      <span id="selectedCoords">(-)</span>
    </div>
    <div class="edit-section">
      <label for="contentInput" class="note-badge">📝 内容</label>
      <input type="text" id="contentInput" placeholder="输入备注..." autocomplete="off">
      <span class="auto-save-hint">✨ 切换区块自动保存</span>
    </div>
  </div>
</div>

<script>
  (function() {
    const canvas = document.getElementById('chunkCanvas');
    const ctx = canvas.getContext('2d');
    const wrapper = document.getElementById('gridWrapper');
    const toast = document.getElementById('toast');
    const fileInput = document.getElementById('fileInput');
    const installBtn = document.getElementById('installBtn');

    const BASE_CELL_SIZE = 120;
    const VIEW_RANGE = 1000;
    
    const STORAGE_KEY = 'chunk_notes_data';
    
    const MIN_ZOOM = 0.4;
    const MAX_ZOOM = 4;
    
    let zoom = 1;
    let cellSize = BASE_CELL_SIZE;
    
    let anchorWorldX = 0;
    let anchorWorldY = 0;
    
    let offsetScreenX = 0;
    let offsetScreenY = 0;
    
    let selectedChunkX = null;
    let selectedChunkY = null;

    const chunkData = new Map();

    const coordXInput = document.getElementById('coordX');
    const coordYInput = document.getElementById('coordY');
    const goBtn = document.getElementById('goBtn');
    const resetViewBtn = document.getElementById('resetViewBtn');
    const exportBtn = document.getElementById('exportBtn');
    const importBtn = document.getElementById('importBtn');
    const clearAllBtn = document.getElementById('clearAllBtn');
    const selectedCoordsSpan = document.getElementById('selectedCoords');
    const contentInput = document.getElementById('contentInput');
    const storageIndicator = document.getElementById('storageIndicator');
    const zoomIndicator = document.getElementById('zoomIndicator');

    const isMobile = /Android|iPhone|iPad|iPod|webOS/i.test(navigator.userAgent) || 
                     ('ontouchstart' in window && window.innerWidth < 1024);
    
    let isDragging = false;
    let dragStartX = 0;
    let dragStartY = 0;
    let startOffsetX = 0;
    let startOffsetY = 0;
    let hasDragged = false;

    let touchStartTime = 0;
    let touchStartPos = { x: 0, y: 0 };
    let touchMoved = false;
    let initialPinchDistance = 0;
    let initialZoom = 1;
    let pinchCenterWorld = { x: 0, y: 0 };

    // ========== PWA 安装 ==========
    let deferredPrompt = null;

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      installBtn.style.display = 'flex';
    });

    installBtn.addEventListener('click', async () => {
      if (!deferredPrompt) {
        showToast('安装功能暂不可用，您可以通过浏览器菜单手动安装');
        return;
      }
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      if (outcome === 'accepted') {
        showToast('安装成功！');
        installBtn.style.display = 'none';
      }
      deferredPrompt = null;
    });

    window.addEventListener('appinstalled', () => {
      installBtn.style.display = 'none';
      deferredPrompt = null;
    });

    // ========== Toast ==========
    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add('show');
      clearTimeout(toast._timeout);
      toast._timeout = setTimeout(() => {
        toast.classList.remove('show');
      }, 2500);
    }

    // ========== 本地存储 ==========
    function saveToStorage() {
      try {
        const dataObj = {};
        chunkData.forEach((value, key) => {
          if (value && value.trim() !== '') {
            dataObj[key] = value;
          }
        });
        localStorage.setItem(STORAGE_KEY, JSON.stringify(dataObj));
        storageIndicator.textContent = '💾 已缓存';
        storageIndicator.style.color = '#5b6e4b';
      } catch (e) {
        storageIndicator.textContent = '⚠️ 缓存失败';
        storageIndicator.style.color = '#d44545';
      }
    }

    function loadFromStorage() {
      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
          const dataObj = JSON.parse(saved);
          chunkData.clear();
          Object.entries(dataObj).forEach(([key, value]) => {
            if (value && value.trim() !== '') {
              chunkData.set(key, value);
            }
          });
          storageIndicator.textContent = '💾 已加载';
          storageIndicator.style.color = '#5b6e4b';
          return true;
        }
      } catch (e) {
        storageIndicator.textContent = '⚠️ 加载失败';
        storageIndicator.style.color = '#d44545';
      }
      return false;
    }

    function clearAllData() {
      if (chunkData.size === 0) {
        alert('当前没有任何备注内容');
        return;
      }
      if (confirm(`确定要清空全部 ${chunkData.size} 个区块的备注内容吗？此操作不可撤销。`)) {
        chunkData.clear();
        selectedChunkX = null;
        selectedChunkY = null;
        contentInput.value = '';
        try {
          localStorage.removeItem(STORAGE_KEY);
          storageIndicator.textContent = '💾 已清空';
          storageIndicator.style.color = '#d44545';
          setTimeout(() => {
            storageIndicator.textContent = '💾 无缓存';
            storageIndicator.style.color = '#5b6e4b';
          }, 2000);
        } catch (e) {}
        refresh();
      }
    }

    // ========== 自动保存当前选中区块的内容 ==========
    function autoSaveCurrentContent() {
      if (selectedChunkX === null || selectedChunkY === null) return;
      
      const content = contentInput.value.trim();
      const key = `${selectedChunkX},${selectedChunkY}`;
      
      if (content === '') {
        // 如果内容为空，且之前有内容，则删除
        if (chunkData.has(key)) {
          chunkData.delete(key);
          saveToStorage();
        }
      } else {
        // 只有内容变化时才保存
        const oldContent = chunkData.get(key) || '';
        if (oldContent !== content) {
          chunkData.set(key, content);
          saveToStorage();
        }
      }
    }

    // ========== 导入导出 ==========
    function getDataAsJSON() {
      const dataObj = {};
      chunkData.forEach((value, key) => {
        if (value && value.trim() !== '') {
          dataObj[key] = value;
        }
      });
      return JSON.stringify(dataObj, null, 2);
    }

    function generateExportImageBlob(dataObj) {
      return new Promise((resolve) => {
        const entries = Object.entries(dataObj);
        const scale = 2;
        const cardWidth = 280 * scale;
        const cardHeight = 80 * scale;
        const cardPadding = 20 * scale;
        const cardsPerRow = 3;
        const rows = Math.ceil(entries.length / cardsPerRow);
        
        const totalWidth = cardPadding + cardsPerRow * (cardWidth + cardPadding);
        const totalHeight = cardPadding + rows * (cardHeight + cardPadding) + 60 * scale;
        
        const tempCanvas = document.createElement('canvas');
        const tempCtx = tempCanvas.getContext('2d');
        
        tempCanvas.width = totalWidth;
        tempCanvas.height = totalHeight;
        
        const gradient = tempCtx.createLinearGradient(0, 0, totalWidth, totalHeight);
        gradient.addColorStop(0, '#1a3a6a');
        gradient.addColorStop(0.5, '#1e4d8a');
        gradient.addColorStop(1, '#1a3a6a');
        tempCtx.fillStyle = gradient;
        tempCtx.fillRect(0, 0, totalWidth, totalHeight);
        
        tempCtx.strokeStyle = 'rgba(74, 154, 245, 0.1)';
        tempCtx.lineWidth = 1;
        const gridSize = 40 * scale;
        for (let x = 0; x < totalWidth; x += gridSize) {
          tempCtx.beginPath();
          tempCtx.moveTo(x, 0);
          tempCtx.lineTo(x, totalHeight);
          tempCtx.stroke();
        }
        for (let y = 0; y < totalHeight; y += gridSize) {
          tempCtx.beginPath();
          tempCtx.moveTo(0, y);
          tempCtx.lineTo(totalWidth, y);
          tempCtx.stroke();
        }
        
        tempCtx.strokeStyle = '#4a9af5';
        tempCtx.lineWidth = 4 * scale;
        tempCtx.strokeRect(4 * scale, 4 * scale, totalWidth - 8 * scale, totalHeight - 8 * scale);
        tempCtx.strokeStyle = '#2a6ab5';
        tempCtx.lineWidth = 2 * scale;
        tempCtx.strokeRect(8 * scale, 8 * scale, totalWidth - 16 * scale, totalHeight - 16 * scale);
        
        tempCtx.fillStyle = '#ffffff';
        tempCtx.font = `bold ${24 * scale}px "Segoe UI", "Roboto", "Microsoft YaHei", sans-serif`;
        tempCtx.textAlign = 'center';
        tempCtx.fillText('📦 区块备注数据', totalWidth / 2, 40 * scale);
        
        entries.forEach(([key, value], index) => {
          const row = Math.floor(index / cardsPerRow);
          const col = index % cardsPerRow;
          const cx = cardPadding + col * (cardWidth + cardPadding);
          const cy = 60 * scale + row * (cardHeight + cardPadding);
          
          tempCtx.fillStyle = 'rgba(10, 25, 60, 0.8)';
          tempCtx.strokeStyle = '#4a9af5';
          tempCtx.lineWidth = 2 * scale;
          roundRect(tempCtx, cx, cy, cardWidth, cardHeight, 10 * scale);
          tempCtx.fill();
          tempCtx.stroke();
          
          const [wx, wy] = key.split(',').map(Number);
          tempCtx.fillStyle = '#7ab8ff';
          tempCtx.font = `bold ${16 * scale}px "Segoe UI", "Roboto", "Microsoft YaHei", sans-serif`;
          tempCtx.textAlign = 'left';
          tempCtx.fillText(`📍 (${wx}, ${wy})`, cx + 15 * scale, cy + 30 * scale);
          
          tempCtx.fillStyle = '#d0e8ff';
          tempCtx.font = `${14 * scale}px "Segoe UI", "Roboto", "Microsoft YaHei", sans-serif`;
          const displayValue = value.length > 18 ? value.substring(0, 17) + '…' : value;
          tempCtx.fillText(`📝 ${displayValue}`, cx + 15 * scale, cy + 55 * scale);
        });
        
        tempCtx.fillStyle = '#5a8acf';
        tempCtx.font = `${12 * scale}px "Segoe UI", "Roboto", sans-serif`;
        tempCtx.textAlign = 'right';
        tempCtx.fillText(`总计: ${entries.length} 条 | ${new Date().toLocaleString()}`, totalWidth - 20 * scale, totalHeight - 20 * scale);
        
        tempCanvas.toBlob(resolve, 'image/png');
      });
    }

    function roundRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    async function exportData() {
      // 导出前先自动保存
      autoSaveCurrentContent();
      
      const jsonStr = getDataAsJSON();
      const dataObj = JSON.parse(jsonStr);
      const count = Object.keys(dataObj).length;
      
      if (count === 0) {
        showToast('没有可导出的数据');
        return;
      }

      try {
        showToast('正在打包...');
        
        const imgBlob = await generateExportImageBlob(dataObj);
        
        const zip = new JSZip();
        zip.file('chunk_notes.json', jsonStr);
        zip.file('chunk_notes_preview.png', imgBlob);
        
        const zipBlob = await zip.generateAsync({ type: 'blob' });
        
        const zipUrl = URL.createObjectURL(zipBlob);
        const link = document.createElement('a');
        link.href = zipUrl;
        link.download = `chunk_notes_${Date.now()}.zip`;
        link.click();
        URL.revokeObjectURL(zipUrl);
        
        showToast(`已导出 ${count} 条记录（ZIP压缩包）`);
      } catch (err) {
        console.error('导出失败:', err);
        const imgBlob = await generateExportImageBlob(dataObj);
        
        const jsonBlob = new Blob([jsonStr], { type: 'application/json' });
        const jsonUrl = URL.createObjectURL(jsonBlob);
        const jsonLink = document.createElement('a');
        jsonLink.href = jsonUrl;
        jsonLink.download = `chunk_notes_${Date.now()}.json`;
        jsonLink.click();
        URL.revokeObjectURL(jsonUrl);

        const imgUrl = URL.createObjectURL(imgBlob);
        const imgLink = document.createElement('a');
        imgLink.href = imgUrl;
        imgLink.download = `chunk_notes_${Date.now()}.png`;
        imgLink.click();
        URL.revokeObjectURL(imgUrl);
        
        showToast(`已分别导出 ${count} 条记录（JSON + 图片）`);
      }
    }

    function importData() {
      autoSaveCurrentContent();
      fileInput.click();
    }

    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;
      
      const reader = new FileReader();
      reader.onload = (event) => {
        try {
          const dataObj = JSON.parse(event.target.result);
          const entries = Object.entries(dataObj);
          
          if (entries.length === 0) {
            showToast('JSON文件中没有数据');
            return;
          }
          
          if (chunkData.size > 0) {
            if (!confirm(`当前有 ${chunkData.size} 条记录，导入将合并数据，是否继续？`)) {
              fileInput.value = '';
              return;
            }
          }
          
          let importCount = 0;
          entries.forEach(([key, value]) => {
            if (typeof value === 'string' && value.trim() !== '') {
              if (/^-?\d+,-?\d+$/.test(key)) {
                chunkData.set(key, value.trim());
                importCount++;
              }
            }
          });
          
          saveToStorage();
          fileInput.value = '';
          refresh();
          showToast(`成功导入 ${importCount} 条记录`);
        } catch (err) {
          showToast('导入失败：JSON格式错误');
          fileInput.value = '';
        }
      };
      reader.readAsText(file);
    });

    // ========== 坐标系统 ==========
    function worldToScreen(worldX, worldY) {
      const w = canvas.width;
      const h = canvas.height;
      return {
        x: w / 2 + (worldX - anchorWorldX) * cellSize + offsetScreenX,
        y: h / 2 + (worldY - anchorWorldY) * cellSize + offsetScreenY
      };
    }

    function screenToWorld(screenX, screenY) {
      const w = canvas.width;
      const h = canvas.height;
      return {
        worldX: anchorWorldX + (screenX - w / 2 - offsetScreenX) / cellSize,
        worldY: anchorWorldY + (screenY - h / 2 - offsetScreenY) / cellSize
      };
    }

    function getVisibleWorldBounds() {
      const w = canvas.width;
      const h = canvas.height;
      const topLeft = screenToWorld(0, 0);
      const bottomRight = screenToWorld(w, h);
      return {
        minX: Math.floor(Math.min(topLeft.worldX, bottomRight.worldX)) - 1,
        maxX: Math.ceil(Math.max(topLeft.worldX, bottomRight.worldX)) + 1,
        minY: Math.floor(Math.min(topLeft.worldY, bottomRight.worldY)) - 1,
        maxY: Math.ceil(Math.max(topLeft.worldY, bottomRight.worldY)) + 1
      };
    }

    function resizeCanvas() {
      const rect = wrapper.getBoundingClientRect();
      if (canvas.width !== rect.width || canvas.height !== rect.height) {
        canvas.width = rect.width;
        canvas.height = rect.height;
        canvas.style.width = rect.width + 'px';
        canvas.style.height = rect.height + 'px';
      }
    }

    function jumpToWorld(worldX, worldY) {
      autoSaveCurrentContent();
      anchorWorldX = worldX;
      anchorWorldY = worldY;
      offsetScreenX = 0;
      offsetScreenY = 0;
      refresh();
    }

    // ========== 渲染 ==========
    function drawGrid() {
      resizeCanvas();
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      const bounds = getVisibleWorldBounds();
      
      const startX = Math.max(anchorWorldX - VIEW_RANGE, bounds.minX);
      const endX = Math.min(anchorWorldX + VIEW_RANGE, bounds.maxX);
      const startY = Math.max(anchorWorldY - VIEW_RANGE, bounds.minY);
      const endY = Math.min(anchorWorldY + VIEW_RANGE, bounds.maxY);

      const corners = [
        { wx: anchorWorldX - VIEW_RANGE, wy: anchorWorldY - VIEW_RANGE },
        { wx: anchorWorldX + VIEW_RANGE, wy: anchorWorldY - VIEW_RANGE },
        { wx: anchorWorldX - VIEW_RANGE, wy: anchorWorldY + VIEW_RANGE },
        { wx: anchorWorldX + VIEW_RANGE, wy: anchorWorldY + VIEW_RANGE }
      ];
      
      corners.forEach(corner => {
        const s = worldToScreen(corner.wx, corner.wy);
        if (s.x > -cellSize && s.x < canvas.width + cellSize &&
            s.y > -cellSize && s.y < canvas.height + cellSize) {
          ctx.fillStyle = 'rgba(212, 69, 69, 0.15)';
          ctx.beginPath();
          ctx.moveTo(s.x, s.y);
          ctx.lineTo(s.x + 30 * zoom, s.y);
          ctx.lineTo(s.x, s.y + 30 * zoom);
          ctx.closePath();
          ctx.fill();
          ctx.fillStyle = '#d44545';
          ctx.font = `${Math.max(8, 12 * zoom)}px "Segoe UI", "Roboto", sans-serif`;
          ctx.textAlign = 'left';
          ctx.textBaseline = 'top';
          ctx.fillText('✕', s.x + 4 * zoom, s.y + 4 * zoom);
        }
      });

      for (let wy = startY; wy <= endY; wy++) {
        for (let wx = startX; wx <= endX; wx++) {
          if (Math.abs(wx - anchorWorldX) > VIEW_RANGE || Math.abs(wy - anchorWorldY) > VIEW_RANGE) continue;
          
          const s = worldToScreen(wx, wy);
          const x = s.x;
          const y = s.y;

          if (x + cellSize < -1 || x > canvas.width + 1 || y + cellSize < -1 || y > canvas.height + 1) continue;

          const isEven = (wx + wy) % 2 === 0;
          let baseColor = isEven ? '#b3d9a0' : '#9ac97a';

          const key = `${wx},${wy}`;
          const hasContent = chunkData.has(key) && chunkData.get(key).trim() !== '';
          if (hasContent) {
            baseColor = isEven ? '#d4e3b0' : '#c2d69a';
          }

          ctx.fillStyle = baseColor;
          ctx.fillRect(x + 1, y + 1, cellSize - 2, cellSize - 2);

          ctx.strokeStyle = '#4d5a2b';
          ctx.lineWidth = Math.max(1, 2 * zoom);
          ctx.strokeRect(x + 1, y + 1, cellSize - 2, cellSize - 2);

          const fontSize = Math.max(10, 18 * zoom);
          ctx.font = `bold ${fontSize}px "Segoe UI", "Roboto", "Microsoft YaHei", sans-serif`;
          ctx.fillStyle = '#1e2e0e';
          ctx.textBaseline = 'top';
          ctx.textAlign = 'left';
          ctx.fillText(`${wx},${wy}`, x + 8 * zoom, y + 8 * zoom);

          if (hasContent) {
            const content = chunkData.get(key);
            const contentFontSize = Math.max(8, 16 * zoom);
            ctx.font = `500 ${contentFontSize}px "Segoe UI", "Roboto", "Microsoft YaHei", sans-serif`;
            ctx.fillStyle = '#0f2b0a';
            let displayText = content.length > 10 ? content.substring(0, 9) + '…' : content;
            ctx.fillText(displayText, x + 8 * zoom, y + cellSize - 28 * zoom);
            
            const emojiSize = Math.max(12, 20 * zoom);
            ctx.font = `${emojiSize}px "Segoe UI", "Roboto", sans-serif`;
            ctx.fillStyle = '#b45f2a';
            ctx.textAlign = 'right';
            ctx.fillText('📌', x + cellSize - 12 * zoom, y + 12 * zoom);
          }
        }
      }

      const anchorChunkX = Math.floor(anchorWorldX);
      const anchorChunkY = Math.floor(anchorWorldY);
      const anchorScreen = worldToScreen(anchorChunkX, anchorChunkY);
      
      if (anchorScreen.x + cellSize > -1 && anchorScreen.x < canvas.width + 1 &&
          anchorScreen.y + cellSize > -1 && anchorScreen.y < canvas.height + 1) {
        ctx.strokeStyle = '#f7e05e';
        ctx.lineWidth = Math.max(2, 5 * zoom);
        ctx.strokeRect(anchorScreen.x + 3, anchorScreen.y + 3, cellSize - 7, cellSize - 7);
        
        const anchorSize = Math.max(16, 24 * zoom);
        ctx.font = `bold ${anchorSize}px "Segoe UI", "Roboto", sans-serif`;
        ctx.fillStyle = '#3b3300';
        ctx.textAlign = 'center';
        ctx.fillText('⚓', anchorScreen.x + cellSize / 2, anchorScreen.y + 45 * zoom);
      }

      if (selectedChunkX !== null && selectedChunkY !== null) {
        const selS = worldToScreen(selectedChunkX, selectedChunkY);
        if (selS.x + cellSize > -1 && selS.x < canvas.width + 1 &&
            selS.y + cellSize > -1 && selS.y < canvas.height + 1) {
          ctx.strokeStyle = '#d580ff';
          ctx.lineWidth = Math.max(2, 5 * zoom);
          ctx.strokeRect(selS.x + 3, selS.y + 3, cellSize - 7, cellSize - 7);
          ctx.strokeStyle = '#b84dff';
          ctx.lineWidth = Math.max(1, 3 * zoom);
          ctx.strokeRect(selS.x - 2, selS.y - 2, cellSize + 3, cellSize + 3);
        }
      }

      zoomIndicator.textContent = `🔍 ${Math.round(zoom * 100)}%`;
    }

    function updateUI() {
      coordXInput.value = anchorWorldX;
      coordYInput.value = anchorWorldY;

      if (selectedChunkX !== null && selectedChunkY !== null) {
        selectedCoordsSpan.textContent = `(${selectedChunkX}, ${selectedChunkY})`;
        const key = `${selectedChunkX},${selectedChunkY}`;
        const currentContent = chunkData.get(key) || '';
        contentInput.value = currentContent;
        contentInput.disabled = false;
      } else {
        selectedCoordsSpan.textContent = '未选择';
        contentInput.value = '';
        contentInput.disabled = true;
      }
    }

    function refresh() {
      drawGrid();
      updateUI();
    }

    function selectChunkAt(clientX, clientY) {
      const rect = canvas.getBoundingClientRect();
      const screenX = clientX - rect.left;
      const screenY = clientY - rect.top;
      const { worldX, worldY } = screenToWorld(screenX, screenY);
      
      const chunkX = Math.floor(worldX);
      const chunkY = Math.floor(worldY);
      
      if (Math.abs(chunkX - anchorWorldX) > VIEW_RANGE || Math.abs(chunkY - anchorWorldY) > VIEW_RANGE) return;

      // 如果点击的是已选中的区块，取消选中
      if (selectedChunkX === chunkX && selectedChunkY === chunkY) {
        autoSaveCurrentContent();
        selectedChunkX = null;
        selectedChunkY = null;
        refresh();
        return;
      }

      // 点击不同区块：先自动保存当前内容，再选中新区块
      autoSaveCurrentContent();
      
      selectedChunkX = chunkX;
      selectedChunkY = chunkY;
      refresh();
    }

    // ========== 桌面端事件 ==========
    function setupDesktopEvents() {
      wrapper.addEventListener('mousedown', (e) => {
        if (e.button !== 0) return;
        isDragging = true;
        hasDragged = false;
        dragStartX = e.clientX;
        dragStartY = e.clientY;
        startOffsetX = offsetScreenX;
        startOffsetY = offsetScreenY;
        wrapper.classList.add('dragging');
        e.preventDefault();
      });

      window.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        const dx = e.clientX - dragStartX;
        const dy = e.clientY - dragStartY;
        if (Math.abs(dx) > 2 || Math.abs(dy) > 2) hasDragged = true;
        offsetScreenX = startOffsetX + dx;
        offsetScreenY = startOffsetY + dy;
        refresh();
      });

      window.addEventListener('mouseup', (e) => {
        if (!isDragging) return;
        isDragging = false;
        wrapper.classList.remove('dragging');
        if (!hasDragged) selectChunkAt(e.clientX, e.clientY);
      });

      wrapper.addEventListener('wheel', (e) => {
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        const mouseScreenX = e.clientX - rect.left;
        const mouseScreenY = e.clientY - rect.top;
        
        const worldBefore = screenToWorld(mouseScreenX, mouseScreenY);
        
        const oldZoom = zoom;
        if (e.deltaY < 0) {
          zoom = Math.min(MAX_ZOOM, zoom * 1.15);
        } else {
          zoom = Math.max(MIN_ZOOM, zoom / 1.15);
        }
        
        if (oldZoom !== zoom) {
          cellSize = BASE_CELL_SIZE * zoom;
          const w = canvas.width;
          const h = canvas.height;
          offsetScreenX = mouseScreenX - w / 2 - (worldBefore.worldX - anchorWorldX) * cellSize;
          offsetScreenY = mouseScreenY - h / 2 - (worldBefore.worldY - anchorWorldY) * cellSize;
          refresh();
        }
      }, { passive: false });
    }

    // ========== 移动端事件 ==========
    function getTouchDistance(touches) {
      const dx = touches[0].clientX - touches[1].clientX;
      const dy = touches[0].clientY - touches[1].clientY;
      return Math.sqrt(dx * dx + dy * dy);
    }

    function getTouchCenter(touches) {
      return {
        x: (touches[0].clientX + touches[1].clientX) / 2,
        y: (touches[0].clientY + touches[1].clientY) / 2
      };
    }

    function setupMobileEvents() {
      wrapper.addEventListener('touchstart', (e) => {
        if (e.touches.length === 1) {
          touchStartTime = Date.now();
          touchStartPos = { x: e.touches[0].clientX, y: e.touches[0].clientY };
          touchMoved = false;
          startOffsetX = offsetScreenX;
          startOffsetY = offsetScreenY;
        } else if (e.touches.length === 2) {
          initialPinchDistance = getTouchDistance(e.touches);
          initialZoom = zoom;
          const center = getTouchCenter(e.touches);
          const rect = canvas.getBoundingClientRect();
          const screenX = center.x - rect.left;
          const screenY = center.y - rect.top;
          pinchCenterWorld = screenToWorld(screenX, screenY);
        }
      }, { passive: false });

      wrapper.addEventListener('touchmove', (e) => {
        e.preventDefault();
        
        if (e.touches.length === 1 && initialPinchDistance === 0) {
          const dx = e.touches[0].clientX - touchStartPos.x;
          const dy = e.touches[0].clientY - touchStartPos.y;
          if (Math.abs(dx) > 5 || Math.abs(dy) > 5) {
            touchMoved = true;
          }
          if (touchMoved) {
            offsetScreenX = startOffsetX + dx;
            offsetScreenY = startOffsetY + dy;
            refresh();
          }
        } else if (e.touches.length === 2) {
          const currentDistance = getTouchDistance(e.touches);
          const center = getTouchCenter(e.touches);
          const rect = canvas.getBoundingClientRect();
          const screenX = center.x - rect.left;
          const screenY = center.y - rect.top;
          
          if (initialPinchDistance > 0) {
            const scale = currentDistance / initialPinchDistance;
            const newZoom = Math.max(MIN_ZOOM, Math.min(MAX_ZOOM, initialZoom * scale));
            
            if (newZoom !== zoom) {
              zoom = newZoom;
              cellSize = BASE_CELL_SIZE * zoom;
              const w = canvas.width;
              const h = canvas.height;
              offsetScreenX = screenX - w / 2 - (pinchCenterWorld.worldX - anchorWorldX) * cellSize;
              offsetScreenY = screenY - h / 2 - (pinchCenterWorld.worldY - anchorWorldY) * cellSize;
              refresh();
            }
          }
        }
      }, { passive: false });

      wrapper.addEventListener('touchend', (e) => {
        if (e.touches.length === 0) {
          if (!touchMoved && initialPinchDistance === 0) {
            const elapsed = Date.now() - touchStartTime;
            if (elapsed < 300) {
              selectChunkAt(touchStartPos.x, touchStartPos.y);
            }
          }
          touchMoved = false;
          initialPinchDistance = 0;
          touchStartTime = 0;
        } else if (e.touches.length === 1) {
          if (initialPinchDistance > 0) {
            touchStartPos = { x: e.touches[0].clientX, y: e.touches[0].clientY };
            startOffsetX = offsetScreenX;
            startOffsetY = offsetScreenY;
            touchMoved = false;
            initialPinchDistance = 0;
          }
        }
      });
    }

    function goToCoordinates() {
      let x = parseInt(coordXInput.value, 10);
      let y = parseInt(coordYInput.value, 10);
      if (isNaN(x)) x = 0;
      if (isNaN(y)) y = 0;
      jumpToWorld(x, y);
    }

    function resetView() {
      autoSaveCurrentContent();
      zoom = 1;
      cellSize = BASE_CELL_SIZE;
      offsetScreenX = 0;
      offsetScreenY = 0;
      jumpToWorld(0, 0);
    }

    // 内容输入框回车保存
    contentInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        autoSaveCurrentContent();
        showToast('内容已保存');
      }
    });

    // 内容输入框失去焦点时自动保存
    contentInput.addEventListener('blur', () => {
      autoSaveCurrentContent();
    });

    goBtn.addEventListener('click', goToCoordinates);
    resetViewBtn.addEventListener('click', resetView);
    exportBtn.addEventListener('click', exportData);
    importBtn.addEventListener('click', importData);
    clearAllBtn.addEventListener('click', clearAllData);

    coordXInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') goToCoordinates();
    });
    coordYInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') goToCoordinates();
    });

    window.addEventListener('resize', () => {
      resizeCanvas();
      refresh();
    });

    if (isMobile) {
      setupMobileEvents();
      wrapper.style.cursor = 'default';
    } else {
      setupDesktopEvents();
    }

    loadFromStorage();
    setTimeout(() => {
      resizeCanvas();
      jumpToWorld(0, 0);
    }, 100);
  })();
</script>
</body>
</html>
